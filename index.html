<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Propuestas Profesionales | LUMO Travels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { lumo: '#E6FF00', dark: '#2D2D2D' } }
            }
        }
    </script>
    <style>
        /* ESTILOS PARA LA PÁGINA WEB */
        #pdf-template {
            display: none; /* Mantener oculto en la web */
        }
        
        /* ESTILOS ESPECÍFICOS PARA EL PDF (Basado en A4 estándar) */
        #pdf-container {
            width: 794px; /* Ancho de un A4 a 96 DPI */
            background: white;
            font-family: 'Arial', sans-serif;
            color: #2D2D2D;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .pdf-header {
            background-color: #E6FF00;
            padding: 25px 20px;
            text-align: center;
            margin: 0;
        }
        
        .legal-banner {
            text-align: center;
            padding: 10px 30px;
            background: #f3f4f6;
            border-bottom: 5px solid #E6FF00;
            margin: 0;
        }

        .image-container {
            width: 100%;
            height: 380px; /* Alto fijo proporcional */
            overflow: hidden;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pdf-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Llena el ancho sin deformarse */
            display: block;
            margin: 0;
        }

        .content-box {
            padding: 35px 50px; /* Espaciado interno limpio */
        }
        
        /* 🔥 EL NUEVO ESTILO LUMO PARA INCLUSIONES 🔥 */
        .inclusion-item {
            background: #ffffff;
            border-left: 6px solid #E6FF00;
            padding: 14px 20px;
            margin-bottom: 12px;
            border-radius: 0 10px 10px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            font-size: 16px;
            color: #333;
            display: flex;
            align-items: center;
            border-top: 1px solid #f3f4f6;
            border-right: 1px solid #f3f4f6;
            border-bottom: 1px solid #f3f4f6;
        }
        
        /* PREVENIR CORTES */
        .avoid-break {
            page-break-inside: avoid;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-dark mb-2">🍋 LUMO Travels</h1>
            <p class="text-gray-500">Generador de Propuestas (V1.2 Premium)</p>
        </div>

        <form id="lumo-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Hotel / Destino</label>
                    <input type="text" id="hotel" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-lumo outline-none" placeholder="Ej: Hotel Occidental Caribe">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Fechas de Viaje</label>
                    <input type="text" id="fechas" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-lumo outline-none" placeholder="Ej: 10 al 13 de Junio 2026">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Precio Total INVERSIÓN</label>
                <input type="text" id="precio" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-lumo outline-none" placeholder="Ej: $2.220.000">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Inclusiones (Escribe normal, el sistema le pone el diseño)</label>
                <textarea id="inclusiones" rows="5" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-lumo outline-none" placeholder="Vuelos ida y vuelta desde Medellín&#10;Traslados privados&#10;Desayunos diarios"></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Textos Legales / Condiciones</label>
                <textarea id="legales" rows="4" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-lumo outline-none text-sm" placeholder="Tarifa sujeta a disponibilidad..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Foto 1 (Principal - Fachada/Piscina)</label>
                    <input type="file" id="foto1" accept="image/*" class="w-full text-sm">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Foto 2 (Secundaria - Habitación/Playa)</label>
                    <input type="file" id="foto2" accept="image/*" class="w-full text-sm">
                </div>
            </div>

            <button type="button" onclick="generarTodo()" class="w-full bg-lumo text-dark font-bold text-lg py-3 rounded-lg shadow-md hover:bg-yellow-400 transition">
                🚀 Generar Propuesta Premium
            </button>
        </form>
    </div>

    <div id="pdf-template">
        <div id="pdf-container">
            
            <div class="avoid-break">
                <div class="pdf-header">
                    <h1 style="font-size: 38px; font-weight: 900; margin: 0; color: #2D2D2D; letter-spacing: -1px;">LUMO Travels</h1>
                    <p style="margin: 5px 0 0 0; font-size: 16px; color: #444; font-weight: bold;">Tu próximo destino comienza aquí 🍋☀️</p>
                </div>
                
                <div class="legal-banner">
                    <p style="margin: 0; font-size: 12px; font-weight: bold; color: #555;">AGENCIA LEGALMENTE CONSTITUIDA | RNT: 278559</p>
                </div>

                <div class="image-container">
                    <img id="pdf-img1" class="pdf-img" src="" style="display: none;">
                </div>
            </div>

            <div class="avoid-break content-box">
                <h2 id="pdf-hotel" style="font-size: 34px; color: #2D2D2D; margin: 0 0 5px 0; font-weight: 900;">Destino</h2>
                <p id="pdf-fechas" style="font-size: 20px; color: #666; font-weight: bold; margin: 0 0 30px 0;">📅 Fechas</p>

                <div style="background: #fafafa; padding: 25px 30px; border-radius: 12px; border: 1px dashed #ccc;">
                    <h3 style="font-size: 22px; margin: 0 0 20px 0; color: #2D2D2D; font-weight: 900;">✨ Tu paquete incluye:</h3>
                    <ul id="pdf-inclusiones" style="margin: 0; padding-left: 0; list-style: none;">
                        </ul>
                </div>
            </div>

            <div class="avoid-break">
                <div class="image-container">
                    <img id="pdf-img2" class="pdf-img" src="" style="display: none;">
                </div>

                <div class="content-box">
                    <div style="background: #E6FF00; padding: 30px; text-align: center; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(230, 255, 0, 0.3);">
                        <p style="margin: 0; font-size: 16px; color: #333; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">INVERSIÓN TOTAL DEL VIAJE</p>
                        <p id="pdf-precio" style="margin: 10px 0 0 0; font-size: 42px; font-weight: 900; color: #000; letter-spacing: -1px;"></p>
                    </div>
                    
                    <div style="background: #f8f9fa; padding: 20px; border-left: 4px solid #ccc; border-radius: 4px;">
                        <h4 style="font-size: 14px; font-weight: bold; margin: 0 0 8px 0; color: #2D2D2D;">⚠️ Términos y Condiciones Legales:</h4>
                        <p id="pdf-legales" style="font-size: 12px; color: #555; line-height: 1.6; margin: 0; text-align: justify;"></p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function cargarImagen(input, imgElementId) {
            return new Promise((resolve) => {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.getElementById(imgElementId);
                        img.src = e.target.result;
                        img.style.display = 'block';
                        resolve();
                    }
                    reader.readAsDataURL(input.files[0]);
                } else {
                    document.getElementById(imgElementId).style.display = 'none';
                    resolve();
                }
            });
        }

        async function generarTodo() {
            const hotel = document.getElementById('hotel').value;
            const fechas = document.getElementById('fechas').value;
            const precio = document.getElementById('precio').value;
            const inclusionesText = document.getElementById('inclusiones').value;
            const legales = document.getElementById('legales').value;

            if(!hotel || !fechas || !precio || !inclusionesText) {
                alert("Socio, por favor llena los campos principales (Hotel, Fechas, Precio e Inclusiones).");
                return;
            }

            document.getElementById('pdf-hotel').innerText = hotel;
            document.getElementById('pdf-fechas').innerText = "📅 " + fechas;
            document.getElementById('pdf-precio').innerText = precio;
            document.getElementById('pdf-legales').innerText = legales;

            // --- MAGIA DE DISEÑO LUMO PARA INCLUSIONES ---
            const ul = document.getElementById('pdf-inclusiones');
            ul.innerHTML = '';
            inclusionesText.split('\n').forEach(linea => {
                if(linea.trim() !== '') {
                    const li = document.createElement('li');
                    li.className = 'inclusion-item'; // Aplica el diseño de tarjeta
                    // Limpia emojis que el usuario haya puesto por error para que no se dupliquen
                    let textoLimpio = linea.replace('✅', '').replace('🍋', '').trim();
                    li.innerHTML = `<span style="margin-right: 15px; font-size: 20px;">✅</span> <span style="font-weight: 600;">${textoLimpio}</span>`;
                    ul.appendChild(li);
                }
            });

            await cargarImagen(document.getElementById('foto1'), 'pdf-img1');
            await cargarImagen(document.getElementById('foto2'), 'pdf-img2');

            // --- LÓGICA DE PDF ---
            const elementoPDF = document.getElementById('pdf-template');
            elementoPDF.style.display = 'block';

            const opcionesPDF = {
                margin: 0,
                filename: `LUMO_Propuesta_${hotel.replace(/\s+/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opcionesPDF).from(elementoPDF).save().then(() => {
                elementoPDF.style.display = 'none';
                
                const textoWhatsApp = `¡Hola! 🏝️ Aquí tienes la propuesta formal de *LUMO Travels* para tu viaje. 🍋☀️\n\n📌 *DESTINO:* ${hotel}\n📅 *FECHAS:* ${fechas}\n💰 *INVERSIÓN:* ${precio}\n\nEn el PDF adjunto verás las fotos y el detalle profesional de lo que te incluimos. También incluimos nuestra información legal (*RNT 278559*) para que reserves con total seguridad. 🛡️✅\n\n*¿Qué te parece la propuesta? Si me das el OK, procedemos a verificar disponibilidad de vuelos ahora mismo.* ✈️`;
                navigator.clipboard.writeText(textoWhatsApp);
                alert("✅ ¡Ahora sí coronamos socio! Diseño Premium LUMO aplicado.");
            });
        }
    </script>
</body>
</html>
